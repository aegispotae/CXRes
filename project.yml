name: CXRes
options:
  bundleIdPrefix: app.gameslicer
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    PRODUCT_BUNDLE_IDENTIFIER: app.gameslicer.cxres
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_FILE: CXRes/Info.plist
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Manual
targets:
  CXRes:
    type: application
    platform: macOS
    sources:
      - path: CXRes
    settings:
      base:
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
